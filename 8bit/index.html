<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>像素分身虚拟空间</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 游戏主画布 -->
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- 手机控制端 -->
    <div id="mobile-control">
        <div class="control-header">
            <div class="player-avatar">
                <canvas id="playerAvatar" width="32" height="32"></canvas>
            </div>
            <div class="player-info">
                <span class="player-name">我的分身</span>
                <span class="player-status">待机中</span>
            </div>
        </div>
        
        <div class="control-body">
            <div class="input-area">
                <input type="text" id="commandInput" placeholder="输入指令，例如：去和蓝衣服的人打招呼" />
                <button id="sendBtn">发送</button>
            </div>
            
            <div class="quick-actions">
                <button class="action-btn" data-action="greet">打招呼</button>
                <button class="action-btn" data-action="random">随机走走</button>
                <button class="action-btn" data-action="chat">找最近的人</button>
                <button class="action-btn" data-action="stop">停止</button>
            </div>
        </div>
        
        <div class="status-bar">
            <span id="statusText">就绪</span>
        </div>
    </div>

    <!-- 像素字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <script src="js/utils.js"></script>
    <script src="js/pathfinding.js"></script>
    <script src="js/character.js"></script>
    <script src="js/map.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
